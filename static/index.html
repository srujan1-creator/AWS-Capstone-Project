<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minnu Platform</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg-dark: #050508;
            --primary: #00ffcc;
            --primary-glow: rgba(0, 255, 204, 0.4);
            --secondary: #ff007f;
            --secondary-glow: rgba(255, 0, 127, 0.4);
            --text-main: #e0e0e0;
            --text-dim: #888;
            --glass-bg: rgba(10, 10, 15, 0.6);
            --glass-border: rgba(0, 255, 204, 0.15);
            --glass-panel: rgba(20, 20, 30, 0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 50% 0%, var(--primary-glow) 0%, transparent 40%),
                linear-gradient(0deg, #020203 0%, var(--bg-dark) 100%);
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 10;
        }

        .brand {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .brand-icon {
            width: 12px;
            height: 12px;
            background-color: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary);
            animation: pulse 2s infinite;
        }

        .nav-links { display: flex; gap: 20px; display: none; }
        .nav-links.active { display: flex; }
        
        .nav-item {
            color: var(--text-dim);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .nav-item:hover, .nav-item.active-nav { color: var(--primary); text-shadow: 0 0 8px var(--primary-glow); }

        /* SPA Views */
        .view { display: none; flex: 1; padding: 40px; animation: fadeIn 0.5s ease-out; }
        .view.active { display: flex; }

        /* Center Layouts for Auth/Settings */
        .center-layout { justify-content: center; align-items: center; }

        .auth-panel {
            background: var(--glass-panel);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 255, 204, 0.05);
            text-align: center;
        }

        .auth-panel h2 { color: var(--primary); margin-bottom: 30px; letter-spacing: 2px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; }
        .input-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }

        .switch-link { color: var(--text-dim); font-size: 12px; margin-top: 20px; cursor: pointer; transition: color 0.3s; }
        .switch-link:hover { color: var(--primary); }

        /* Terminal View */
        .terminal-layout { flex-direction: column; gap: 20px; }
        .terminal-wrapper {
            flex: 1;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,255,204,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .terminal-header {
            padding: 10px 20px;
            border-bottom: 1px solid var(--glass-border);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
        }

        .terminal-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .terminal-body::-webkit-scrollbar { width: 6px; }
        .terminal-body::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 3px; }

        .log-entry { display: flex; gap: 15px; animation: slideIn 0.3s ease-out forwards; opacity: 0; transform: translateY(10px); }
        .log-prefix { font-weight: 700; width: 50px; flex-shrink: 0; }
        .prefix-sys { color: #888; }
        .prefix-usr { color: #fff; }
        .prefix-ai { color: var(--primary); text-shadow: 0 0 5px var(--primary-glow); }
        .prefix-err { color: var(--secondary); }
        .prefix-net { color: #a020f0; }
        .log-message { flex: 1; word-wrap: break-word; }

        .controls { display: flex; justify-content: center; padding: 20px; background: rgba(0,0,0,0.3); border-top: 1px solid var(--glass-border); gap: 20px; }

        /* Buttons */
        .btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px 30px;
            border-radius: 30px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0,255,204,0.1);
            width: 100%;
        }
        .btn:hover { background: var(--primary); color: var(--bg-dark); box-shadow: 0 0 20px var(--primary-glow); }
        .btn-w-auto { width: auto; }
        
        .btn.stop { border-color: var(--secondary); color: var(--secondary); box-shadow: 0 0 10px rgba(255,0,127,0.1); }
        .btn.stop:hover { background: var(--secondary); color: var(--bg-dark); box-shadow: 0 0 20px var(--secondary-glow); }

        /* Profile Details */
        .profile-data { text-align: left; margin-bottom: 30px; font-family: 'JetBrains Mono'; color: var(--text-main); }
        .profile-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .profile-key { color: var(--text-dim); }

        /* Animations */
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand" onclick="switchView('terminal')">
            <div class="brand-icon"></div>
            MINNU
        </div>
        <div class="nav-links" id="navLinks">
            <div class="nav-item" onclick="switchView('terminal')">Terminal</div>
            <div class="nav-item" onclick="loadProfile()">Settings</div>
            <div class="nav-item" onclick="logout()">Logout</div>
        </div>
    </div>

    <!-- Auth View: Login -->
    <div id="view-login" class="view center-layout active">
        <div class="auth-panel">
            <h2>SYSTEM AUTH</h2>
            <div id="login-error" style="color:var(--secondary); font-size: 12px; margin-bottom:10px;"></div>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="login-user" placeholder="Enter username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-pass" placeholder="••••••••">
            </div>
            <button class="btn" onclick="login()">Access System</button>
            <div class="switch-link" onclick="switchView('signup')">Initialize New Subject Array (Sign Up)</div>
        </div>
    </div>

    <!-- Auth View: Sign Up -->
    <div id="view-signup" class="view center-layout">
        <div class="auth-panel">
            <h2>INITIALIZE SUBJECT</h2>
            <div id="signup-error" style="color:var(--secondary); font-size: 12px; margin-bottom:10px;"></div>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="signup-user" placeholder="Create username">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="signup-email" placeholder="Create email">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="signup-pass" placeholder="Create password">
            </div>
            <button class="btn" onclick="signup()">Register</button>
            <div class="switch-link" onclick="switchView('login')">Return to Authentication (Login)</div>
        </div>
    </div>

    <!-- Settings / Profile View -->
    <div id="view-settings" class="view center-layout">
        <div class="auth-panel">
            <h2>SUBJECT PROFILE</h2>
            <div class="profile-data" id="profile-content">
                Loading data streams...
            </div>
            <button class="btn stop" onclick="logout()">Disconnect</button>
        </div>
    </div>

    <!-- Main Terminal View -->
    <div id="view-terminal" class="view terminal-layout">
        <div class="terminal-wrapper">
            <div class="terminal-header">
                <span>SECURE.TERMINAL_OUTPUT</span>
                <span id="terminal-user">UNAUTHORIZED</span>
            </div>
            <div class="terminal-body" id="terminal">
                <!-- Logs will appear here -->
            </div>
            <div class="controls">
                <button class="btn btn-w-auto" id="micBtn">Initialize Audio Stream</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let jwtToken = localStorage.getItem('minnu_token');

        // View Management
        function switchView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${viewName}`).classList.add('active');
            
            // Handle Auth State
            if(jwtToken) {
                document.getElementById('navLinks').classList.add('active');
                if(viewName === 'login' || viewName === 'signup') {
                    switchView('terminal'); // Redirect to app if logged in
                }
            } else {
                document.getElementById('navLinks').classList.remove('active');
                if(viewName === 'terminal' || viewName === 'settings') {
                    switchView('login'); // Protect routes
                }
            }
        }

        // Authentication API Calls
        async function login() {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            const errDiv = document.getElementById('login-error');
            
            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                
                if(res.ok) {
                    const data = await res.json();
                    jwtToken = data.access_token;
                    localStorage.setItem('minnu_token', jwtToken);
                    errDiv.innerText = '';
                    document.getElementById('terminal-user').innerText = `USER: ${u}`;
                    switchView('terminal');
                    log("Authentication successful. Welcome to the grid.", "SYS");
                } else {
                    const data = await res.json();
                    errDiv.innerText = data.detail || 'Access Denied.';
                }
            } catch(e) { errDiv.innerText = 'Network failure.'; }
        }

        async function signup() {
            const u = document.getElementById('signup-user').value;
            const e = document.getElementById('signup-email').value;
            const p = document.getElementById('signup-pass').value;
            const errDiv = document.getElementById('signup-error');
            
            try {
                const res = await fetch(`${API_BASE}/signup`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, email: e, password: p})
                });
                
                if(res.ok) {
                    const data = await res.json();
                    jwtToken = data.access_token;
                    localStorage.setItem('minnu_token', jwtToken);
                    errDiv.innerText = '';
                    document.getElementById('terminal-user').innerText = `USER: ${u}`;
                    switchView('terminal');
                    log("Initialization complete. Welcome to the grid.", "SYS");
                } else {
                    const data = await res.json();
                    errDiv.innerText = data.detail || 'Registration Failed.';
                }
            } catch(ex) { errDiv.innerText = 'Network failure.'; }
        }

        function logout() {
            jwtToken = null;
            localStorage.removeItem('minnu_token');
            switchView('login');
        }

        async function loadProfile() {
            switchView('settings');
            const pDiv = document.getElementById('profile-content');
            pDiv.innerHTML = 'Decrypting records...';
            
            try {
                const res = await fetch(`${API_BASE}/profile`, {
                    headers: {'Authorization': `Bearer ${jwtToken}`}
                });
                if(res.ok) {
                    const data = await res.json();
                    pDiv.innerHTML = `
                        <div class="profile-row"><span class="profile-key">SUBJECT ID</span> <span>${data.username}</span></div>
                        <div class="profile-row"><span class="profile-key">COMM LINK</span> <span>${data.email}</span></div>
                        <div class="profile-row"><span class="profile-key">CREATED</span> <span>${data.account_created}</span></div>
                    `;
                } else {
                    logout();
                }
            } catch(e) { pDiv.innerHTML = 'Encryption Error.'; }
        }

        // Terminal & Speech Logic (Protected)
        const terminal = document.getElementById('terminal');
        const micBtn = document.getElementById('micBtn');
        let recognition;
        let isListening = false;

        function log(message, prefix = 'SYS') {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<div class="log-prefix prefix-${prefix.toLowerCase()}">[${prefix}]</div><div class="log-message">${message}</div>`;
            terminal.appendChild(entry);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function sendToBackend(text) {
            log(`Sending payload...`, 'NET');
            try {
                const res = await fetch(`${API_BASE}/process_command`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${jwtToken}`
                    },
                    body: JSON.stringify({ text: text })
                });

                if (res.ok) {
                    const data = await res.json();
                    log(`Intent: ${data.intent}`, 'AI');
                    log(`Action executed: ${data.action}`, 'SYS');
                    log(data.response_text, 'AI');
                } else if(res.status === 401) {
                    log('Session Expired.', 'ERR');
                    logout();
                } else {
                    log(`Backend Error: ${res.status}`, 'ERR');
                }
            } catch (err) { log(`Connection Failed: ${err.message}`, 'ERR'); }
        }

        function initSpeechRecognition() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!window.SpeechRecognition) {
                log("Speech Recognition API not supported.", 'ERR');
                return;
            }
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            
            recognition.onstart = () => { isListening = true; micBtn.textContent = 'Terminate Stream'; micBtn.classList.add('stop'); log("Audio stream active.", 'SYS'); };
            recognition.onresult = (e) => {
                const transcript = e.results[e.resultIndex][0].transcript;
                log(`"${transcript}"`, 'USR');
                sendToBackend(transcript);
            };
            recognition.onerror = (e) => { log(`Audio Error: ${e.error}`, 'ERR'); isListening = false; micBtn.textContent = 'Retry Stream'; micBtn.classList.remove('stop'); };
            recognition.onend = () => { 
                if(isListening) { try{ recognition.start(); }catch(ex){ isListening=false; } }
                else { micBtn.textContent = 'Initialize Audio Stream'; micBtn.classList.remove('stop'); }
            };
        }

        micBtn.addEventListener('click', () => {
            if(!jwtToken) return;
            if (!recognition) initSpeechRecognition();
            if (isListening) { isListening = false; recognition.stop(); log("Audio stream closed.", 'SYS'); }
            else { try{ recognition.start(); }catch(e){ log("Check permissions.", 'ERR'); } }
        });

        // Initialize state on load
        window.onload = () => {
            if(jwtToken) { switchView('terminal'); loadProfile(); switchView('terminal'); }
            else { switchView('login'); }
        };
    </script>
</body>
</html>
